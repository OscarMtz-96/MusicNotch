name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Self-check
        run: swift run -c release MusicVisualizerSelfCheck

      - name: Package DMG
        run: ./scripts/package-dmg.sh

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "dist/Music Visualizer.dmg"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Music Visualizer.dmg
          path: dist/Music Visualizer.dmg

